<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CELCAT Timetable Extraction - Extract structured class data from CELCAT-generated timetable PDFs.">
    <title>{% block title %}CELCAT Timetable Extractor{% endblock %}</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Base colors - solid, no gradients */
            --bg-deep: #050507;
            --bg-surface: #0e0e14;
            --bg-elevated: #16161e;
            --bg-interactive: #1c1c26;
            
            /* Borders */
            --border-subtle: rgba(255, 255, 255, 0.06);
            --border-medium: rgba(255, 255, 255, 0.12);
            
            /* Accent colors - solid, high contrast */
            --accent-cyan: #00E5FF;
            --accent-cyan-dim: rgba(0, 229, 255, 0.15);
            --accent-amber: #FFB800;
            --accent-amber-dim: rgba(255, 184, 0, 0.15);
            --accent-green: #00D68F;
            --accent-red: #FF3D71;
            
            /* Text colors */
            --text-primary: #FFFFFF;
            --text-secondary: #8B8B9E;
            --text-tertiary: #5C5C6D;
        }

        * {
            font-family: 'IBM Plex Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        }

        h1, h2, h3, h4, h5, h6, .heading-font, .navbar-brand {
            font-family: 'Sora', sans-serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        code, .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        body {
            background: var(--bg-deep);
            color: var(--text-primary);
            min-height: 100vh;
            /* Subtle noise texture */
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
        }

        .navbar {
            background: rgba(5, 5, 7, 0.85) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
        }

        .navbar-brand {
            font-size: 1.15rem;
            font-weight: 700;
        }

        .brand-icon {
            color: var(--accent-cyan);
            font-size: 1.3rem;
        }

        .version-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--accent-cyan-dim);
            color: var(--accent-cyan);
            font-weight: 500;
        }

        .surface-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 7, 0.95) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-subtle);
            padding: 0.75rem 1rem;
        }

        .navbar-brand {
            font-size: 1.15rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .navbar-brand:hover {
            color: var(--text-primary);
        }

        .brand-icon {
            color: var(--accent-cyan);
            font-size: 1.3rem;
        }

        .version-badge {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 4px;
            background: var(--accent-cyan-dim);
            color: var(--accent-cyan);
            font-weight: 500;
        }

        .nav {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            margin: 0;
            padding: 0;
        }

        .nav-item {
            list-style: none;
        }

        .nav-link {
            border: none;
            border-radius: 7px;
            color: var(--text-secondary);
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            padding: 0.4rem 0.75rem;
            transition: all 0.2s ease;
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-link:hover {
            color: var(--text-primary);
            background: var(--bg-interactive);
        }

        .nav-link.active {
            color: var(--bg-deep);
            background: var(--accent-cyan);
            font-weight: 600;
        }

        .nav-link.disabled {
            opacity: 0.4;
            pointer-events: none;
            cursor: not-allowed;
        }

        .tab-content {
            border-radius: 12px !important;
            margin-top: 1.25rem;
        }

        .btn-accent {
            background: var(--accent-cyan);
            border: none;
            color: #000;
            font-family: 'Sora', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            padding: 0.6rem 1.25rem;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .btn-accent:hover {
            background: #33EBFF;
            color: #000;
            transform: translateY(-1px);
        }

        .btn-accent:active {
            transform: translateY(0);
            background: #00CCE5;
        }

        .btn-accent:disabled {
            opacity: 0.4;
            background: var(--text-tertiary);
            color: var(--text-secondary);
            transform: none;
        }

        .form-control, .form-select {
            background: var(--bg-deep);
            border: 1px solid var(--border-medium);
            color: var(--text-primary);
            border-radius: 8px;
            padding: 0.6rem 0.9rem;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .form-control::placeholder {
            color: var(--text-tertiary);
        }

        .form-control:focus, .form-select:focus {
            background: var(--bg-deep);
            border-color: var(--accent-cyan);
            color: var(--text-primary);
            box-shadow: 0 0 0 3px var(--accent-cyan-dim);
        }

        .form-label {
            font-family: 'IBM Plex Sans', sans-serif;
            font-weight: 500;
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.04em;
        }

        .form-text {
            color: var(--text-tertiary);
            font-size: 0.72rem;
        }

        .form-check-label {
            color: var(--text-secondary);
            font-size: 0.8rem;
        }

        .form-check-input {
            background-color: var(--bg-deep);
            border-color: var(--border-medium);
        }

        .form-check-input:checked {
            background-color: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }

        .upload-zone {
            border: 1px dashed var(--border-medium);
            border-radius: 10px;
            padding: 2.5rem 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
            background: var(--bg-deep);
            position: relative;
        }

        .upload-zone:hover, .upload-zone.dragover {
            border-color: var(--accent-cyan);
            background: var(--accent-cyan-dim);
        }

        .upload-zone i {
            font-size: 2rem;
            color: var(--text-tertiary);
            margin-bottom: 0.5rem;
            transition: all 0.2s ease;
        }

        .upload-zone:hover i {
            color: var(--accent-cyan);
        }

        /* Label trigger to activate file input - covers entire upload zone */
        .upload-label-trigger {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            cursor: pointer;
            z-index: 1;
        }

        .table-responsive {
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--border-subtle);
        }

        .table-dark {
            --bs-table-bg: var(--bg-elevated);
            --bs-table-border-color: var(--border-subtle);
            margin-bottom: 0;
            font-size: 0.8rem;
        }

        .table thead th {
            background: var(--bg-deep);
            font-family: 'IBM Plex Sans', sans-serif;
            font-size: 0.68rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-secondary);
            font-weight: 600;
            border-bottom: 1px solid var(--border-subtle);
            padding: 0.7rem 0.6rem;
        }

        .table tbody td {
            padding: 0.6rem;
            vertical-align: middle;
            border-bottom: 1px solid var(--border-subtle);
            color: var(--text-secondary);
        }

        .table tbody tr:hover td {
            background: var(--bg-interactive);
        }

        .badge.pill-type {
            background: var(--accent-cyan-dim) !important;
            color: var(--accent-cyan) !important;
            font-weight: 500;
            font-size: 0.65rem;
        }
        .result-alert {
            border-radius: 8px;
            border: 1px solid;
            font-size: 0.8rem;
            padding: 0.75rem 1rem;
        }

        .alert-danger {
            background: rgba(255, 61, 113, 0.1);
            border-color: rgba(255, 61, 113, 0.3);
            color: #FF80A8;
        }

        .alert-success {
            background: rgba(0, 214, 143, 0.1);
            border-color: rgba(0, 214, 143, 0.3);
            color: #80FFCA;
        }

        .alert-warning {
            background: var(--accent-amber-dim);
            border-color: rgba(255, 184, 0, 0.3);
            color: #FFD780;
        }

        .loading-overlay {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(5, 5, 7, 0.85);
            border-radius: 12px;
            z-index: 10;
            align-items: center;
            justify-content: center;
        }

        .loading-overlay.active {
            display: flex;
        }

        .spinner-border {
            color: var(--accent-cyan);
            width: 2.5rem;
            height: 2.5rem;
            border-width: 3px;
        }

        .stat-card {
            background: var(--bg-deep);
            border: 1px solid var(--border-subtle);
            border-radius: 10px;
            padding: 1rem;
            text-align: center;
            transition: all 0.2s ease;
        }

        .stat-card:hover {
            border-color: var(--border-medium);
            transform: translateY(-2px);
        }

        .stat-value {
            font-family: 'Sora', sans-serif;
            font-size: 1.75rem;
            font-weight: 700;
            line-height: 1.2;
            color: var(--text-primary);
        }

        .stat-value.cyan { color: var(--accent-cyan); }
        .stat-value.amber { color: var(--accent-amber); }
        .stat-value.green { color: var(--accent-green); }
        .stat-value.red { color: var(--accent-red); }

        .stat-label {
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-tertiary);
            margin-top: 0.25rem;
            font-weight: 600;
        }

        .fade-up {
            animation: fadeUp 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .text-accent { color: var(--accent-cyan); }
        .text-secondary { color: var(--text-secondary) !important; }
        .text-tertiary { color: var(--text-tertiary) !important; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-deep); }
        ::-webkit-scrollbar-thumb { background: var(--border-medium); border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

        footer {
            border-top: 1px solid var(--border-subtle);
            color: var(--text-tertiary);
            font-size: 0.72rem;
        }

        .section-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.25rem;
        }

        .section-desc {
            font-size: 0.75rem;
            color: var(--text-tertiary);
            margin-bottom: 1rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .page-title {
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
            letter-spacing: -0.03em;
        }

        .page-subtitle {
            font-size: 0.85rem;
            color: var(--text-tertiary);
            max-width: 500px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .tabs-wrapper {
            max-width: 900px;
            margin: 0 auto;
        }

        .tools-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 1rem;
            max-width: 900px;
            margin: 0 auto;
            padding: 1rem 0;
        }

        .tool-card {
            display: block;
            background: var(--bg-surface);
            border: 1px solid var(--border-subtle);
            border-radius: 12px;
            padding: 1.5rem;
            text-decoration: none;
            color: var(--text-primary);
            transition: all 0.2s ease;
        }

        .tool-card:hover {
            border-color: var(--border-medium);
            transform: translateY(-2px);
            background: var(--bg-elevated);
        }

        .tool-card .tool-icon {
            font-size: 1.75rem;
            margin-bottom: 0.75rem;
        }

        .tool-card .tool-title {
            font-family: 'Sora', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.35rem;
        }

        .tool-card .tool-desc {
            font-size: 0.8rem;
            color: var(--text-tertiary);
            margin-bottom: 0;
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
{% from "_components/nav.html" import nav %}

{{ nav(active=active, version=version) }}

    <!-- Main Content -->
    <main class="container py-4">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Container -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3" style="z-index: 9999;">
        <div id="muteToast" class="toast align-items-center" role="alert" aria-live="assertive" aria-atomic="true" style="background: var(--bg-elevated); border: 1px solid var(--accent-amber);">
            <div class="d-flex">
                <div class="toast-body d-flex align-items-center gap-2" style="color: var(--accent-amber);">
                    <i class="bi bi-exclamation-triangle"></i>
                    <span>Please raise your volume to hear the meme!</span>
                </div>
                <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast" aria-label="Close"></button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-4 mt-5">
        <div class="container text-center">
            CELCAT Timetable Extraction &middot; Structured Data API
        </div>
    </footer>

    <!-- Bootstrap 5 JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    {% block scripts %}{% endblock %}

<script>
document.addEventListener('DOMContentLoaded', function() {
    const memeBtn = document.getElementById('memeBtn');
    const muteToast = document.getElementById('muteToast');
    let audioContext = null;
    let toastBootstrap = null;

    // Initialize toast bootstrap instance
    if (muteToast) {
        toastBootstrap = new bootstrap.Toast(muteToast, { autohide: true, delay: 4000 });
    }

    memeBtn.addEventListener('click', async function() {
        // Create audio context on first click (required by browsers)
        if (!audioContext) {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
        }

        // Resume audio context if suspended
        if (audioContext.state === 'suspended') {
            await audioContext.resume();
        }

        // Show toast if muted warning needed (Web Audio API doesn't expose mute directly)
        // We'll play at low volume first to detect if audio plays, then show warning if it fails
        try {
            const audio = new Audio('/assets/amazin.mp3');
            
            // Try to play at low volume first
            audio.volume = 0.1;
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(function() {
                    // Audio is playing, ramp up volume after short delay
                    setTimeout(function() {
                        audio.volume = 1;
                    }, 200);
                }).catch(function(error) {
                    // If play failed, show the toast
                    console.error('Audio play error:', error);
                    if (toastBootstrap) {
                        toastBootstrap.show();
                    }
                });
            }
            
        } catch (e) {
            console.error('Error playing audio:', e);
            if (toastBootstrap) {
                toastBootstrap.show();
            }
        }
    });
});
</script>
</body>
</html>
