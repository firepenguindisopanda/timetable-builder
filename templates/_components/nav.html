{% macro nav(active, version) %}
<nav class="navbar sticky-top">
    <div class="container-fluid">
        <!-- Brand (left) -->
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <i class="bi bi-layers-half brand-icon"></i>
            <span class="d-none d-md-inline">CELCAT Extractor</span>
            <span class="version-badge">v{{ version }}</span>
        </a>
        
        <!-- Nav links (center on desktop) -->
        <ul class="nav mx-auto">
            <li class="nav-item">
                <a class="nav-link {% if active == 'extract' %}active{% endif %}" href="/extract">Upload</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active == 'batch' %}active{% endif %}" href="/batch">Batch</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active == 'download' %}active{% endif %}" href="/download">Download</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active == 'evaluate' %}active{% endif %}" href="/evaluate">Evaluate</a>
            </li>
            <li class="nav-item">
                <a class="nav-link {% if active == 'calendar' %}active{% endif %}" href="/calendar">
                    <i class="bi bi-calendar3 me-1"></i> Calendar
                </a>
            </li>
        </ul>
        
        <!-- Right side -->
        <div class="d-flex align-items-center gap-3">
            <span id="healthDot" class="d-flex align-items-center gap-2" style="font-size:0.72rem; font-weight: 500; color:var(--text-tertiary);">
                <i class="bi bi-circle-fill" style="font-size:0.45rem; color:var(--accent-green);"></i>
                <span class="d-none d-md-inline">API Online</span>
            </span>
            <a href="/docs" target="_blank" class="btn btn-sm" style="background: var(--bg-elevated); border: 1px solid var(--border-subtle); color: var(--text-secondary); border-radius: 6px; font-size: 0.72rem; padding: 0.35rem 0.75rem;">
                <i class="bi bi-braces"></i>
                <span class="d-none d-md-inline">API Docs</span>
            </a>
            <button id="memeBtn" class="btn btn-sm" style="background: var(--bg-elevated); border: 1px solid var(--border-subtle); color: var(--text-secondary); border-radius: 6px; font-size: 0.72rem; padding: 0.35rem 0.75rem; cursor: pointer;">
                <i class="bi bi-speaker"></i>
                <span class="d-none d-md-inline">Meme</span>
            </button>
        </div>
    </div>
</nav>
{% endmacro %}
